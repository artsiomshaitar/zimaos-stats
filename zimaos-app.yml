# ZimaOS / CasaOS app definition for zimaos-stats.
# In ZimaOS: App Store → Install a customized app → click the import icon
# (top-right of the dialog) → paste this file. Every field below prefills.
name: zimaos-stats
services:
  zimaos-stats:
    # "latest" is deliberate: ZimaOS digest-checks latest-tagged apps, so
    # "Check then update" works. Pin a version tag (e.g. 0.1.0) if you prefer.
    image: ghcr.io/artsiomshaitar/zimaos-stats:latest
    container_name: zimaos-stats
    restart: unless-stopped
    ports:
      - target: 3000
        published: "3080"
        protocol: tcp
    environment:
      - HISTORY_DAYS=7
      - POLL_INTERVAL_SECONDS=2
      - CONTAINER_POLL_INTERVAL_SECONDS=15
      # - DEVICE_NAME=T800  # optional; defaults to the hostname you connect via
    volumes:
      - type: bind
        source: /DATA/AppData/zimaos-stats
        target: /data
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: /sys/devices/virtual/powercap
        target: /powercap
        read_only: true
    x-casaos:
      envs:
        - container: HISTORY_DAYS
          description:
            en_us: How many days of history to keep (1-365)
        - container: POLL_INTERVAL_SECONDS
          description:
            en_us: Seconds between system samples (1-3600)
        - container: CONTAINER_POLL_INTERVAL_SECONDS
          description:
            en_us: Seconds between per-app Docker stats samples (2-3600)
        - container: DEVICE_NAME
          description:
            en_us: Display name (optional; defaults to the hostname you open the app with)
      ports:
        - container: "3000"
          description:
            en_us: Web UI
      volumes:
        - container: /data
          description:
            en_us: SQLite history storage
        - container: /var/run/docker.sock
          description:
            en_us: Docker socket (read) for per-app CPU/RAM stats
        - container: /powercap
          description:
            en_us: Host power sensors (Docker masks RAPL by default)
x-casaos:
  architectures:
    - amd64
    - arm64
  main: zimaos-stats
  author: artsiomshaitar
  developer: artsiomshaitar
  category: Utilities
  icon: https://raw.githubusercontent.com/artsiomshaitar/zimaos-stats/main/icon.png
  title:
    en_us: ZimaOS Stats
  tagline:
    en_us: Resource usage history for your Zima device
  description:
    en_us: >-
      Records CPU, RAM, temperature, power and per-app (container) usage over
      time — the history the built-in System widget doesn't keep. Lightweight
      collector, SQLite storage, self-pruning.
  scheme: http
  port_map: "3080"
  index: /
