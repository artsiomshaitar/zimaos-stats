services:
  zimaos-stats:
    image: ghcr.io/artsiomshaitar/zimaos-stats:latest # or use `build: .`
    container_name: zimaos-stats
    restart: unless-stopped
    ports:
      - "3080:3000"
    environment:
      HISTORY_DAYS: "7"
      POLL_INTERVAL_SECONDS: "2"
      CONTAINER_POLL_INTERVAL_SECONDS: "15"
    volumes:
      # Where the SQLite history lives (on ZimaOS use /DATA/AppData/zimaos-stats)
      - ./data:/data
      # Read-only Docker socket for per-app CPU/RAM stats (optional but recommended)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Host power sensors — Docker masks /sys/devices/virtual/powercap inside
      # containers, so bind it to /powercap for wattage readings (Linux hosts)
      - /sys/devices/virtual/powercap:/powercap:ro
      # Host network counters — /proc/net/dev is network-namespaced, so a bridge
      # container only sees its own veth. Host PID 1's net file is tied to the
      # root netns, so binding it in exposes real host throughput.
      - /proc/1/net/dev:/host/proc/net/dev:ro
